ptq:
  modes:
    - name: int8
      load_in_8bit: true
      load_in_4bit: false

    - name: nf4
      load_in_8bit: false
      load_in_4bit: true
      bnb_4bit_quant_type: nf4
      bnb_4bit_compute_dtype: float16
      bnb_4bit_use_double_quant: false

    - name: gptq_int4
      checkpoint_dir: "assets/models/GPTQ_Mistral-7B-v0.3"
      bits: 4
      group_size: 128
      desc_act: false